name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: youforge-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install + run the Trivy binary directly (no marketplace action to resolve
      # at job setup). Informational gate: report CRITICAL/HIGH, never fail the build.
      - name: Trivy filesystem scan
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin" v0.58.0
          "$RUNNER_TEMP/bin/trivy" fs --scanners vuln,misconfig,secret \
            --severity CRITICAL,HIGH --exit-code 0 --no-progress .
