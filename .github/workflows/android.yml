name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: youforge-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned Trivy release binary (no marketplace action to resolve at job setup,
      # no external vuln-DB pull). Misconfig + secret scan; informational gate —
      # reports CRITICAL/HIGH, never fails the build.
      - name: Trivy filesystem scan
        env:
          TRIVY_VERSION: 0.71.2
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar xz -C "$RUNNER_TEMP" trivy
          "$RUNNER_TEMP/trivy" fs --scanners misconfig,secret \
            --severity CRITICAL,HIGH --exit-code 0 --no-progress .
